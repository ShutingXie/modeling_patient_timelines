seed: 42

data:
  data_dir: data
  processed_dir: outputs/processed
  use_tables:
    - conditions
    - medications
    - procedures
    - observations
    - encounters
    - immunizations
    - careplans
    - allergies
    - devices
  max_seq_len: 128
  min_token_freq: 2
  lab_num_bins: 5
  time_buckets_days: [30, 90, 180, 365, 730, 1825, 3650]
  age_bucket_years: 5

model:
  d_model: 64
  num_layers: 1
  num_heads: 4
  dim_feedforward: 256
  dropout: 0.1
  pooling: cls

training:
  batch_size: 16
  epochs: 1
  learning_rate: 0.0003
  weight_decay: 0.01
  gradient_clip_norm: 1.0
  early_stopping_patience: 5
  pos_weight_clip: 20.0
  use_amp: true
  monitor_metric: val_map

wandb:
  project: ehr-timeline-transformer
  entity: null
  run_name: debug_smoke_test
  mode: disabled

pretrain:
  epochs: 1
  batch_size: 16
  learning_rate: 0.0003
  weight_decay: 0.01
  mask_prob: 0.15
  mask_token_prob: 0.8
  random_token_prob: 0.1
  early_stopping_patience: 3
  gradient_clip_norm: 1.0
  use_amp: true
  split_frac_val: 0.2
  split_seed: 42
